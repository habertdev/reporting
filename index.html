<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Station Reporting Tool</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#2563eb);
    padding:10px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.header{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.header h1{
    font-size:24px;
}

.card{
    background:white;
    border-radius:15px;
    padding:18px;
    margin-bottom:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

h2{
    font-size:18px;
    margin-bottom:12px;
}

.grid{
    display:grid;
    grid-template-columns:1.8fr 1fr 1fr 1fr;
    gap:8px;
    margin-bottom:10px;
    align-items:center;
}

label{
    font-size:14px;
    font-weight:600;
}

input{
    width:100%;
    padding:8px;
    font-size:13px;
    border:1px solid #cbd5e1;
    border-radius:6px;
}

.total-box{
    background:#dbeafe;
    font-weight:bold;
}

button{
    padding:9px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    margin:4px;
    font-size:13px;
}

.save{background:#2563eb;}
.new{background:#16a34a;}
.clear{background:#dc2626;}
.graph-btn{background:#9333ea;}

.report-card{
    background:white;
    border-left:5px solid #2563eb;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:12px;
    min-width:500px;
}

th{
    background:#1d4ed8;
    color:white;
    padding:8px;
    font-size:13px;
}

td{
    padding:8px;
    border:1px solid #e2e8f0;
    text-align:center;
    font-size:13px;
}

.grand{
    background:#dcfce7;
    font-weight:bold;
}

.chart-box{
    display:none;
    margin-top:15px;
    background:#f8fafc;
    padding:15px;
    border-radius:12px;
}

canvas{
    max-height:280px;
}

@media(max-width:992px){
    .grid{
        grid-template-columns:1.5fr 1fr 1fr 1fr;
    }

    input{
        padding:7px;
    }
}

@media(max-width:768px){
    .grid{
        grid-template-columns:1fr;
        gap:6px;
    }

    .header h1{
        font-size:20px;
    }

    button{
        width:100%;
        margin-top:8px;
    }

    table{
        min-width:100%;
    }
}

@media(max-width:480px){
    .card{
        padding:12px;
    }

    input{
        font-size:12px;
        padding:6px;
    }

    th,td{
        font-size:11px;
        padding:6px;
    }

    h2{
        font-size:16px;
    }
}
</style>
</head>
<body>

<div class="container">

<div class="header">
    <h1>Daily Station Reporting Tool</h1>
</div>

<div class="card">

<h2>Station Information</h2>

<div class="grid">
    <label>Station</label>
    <input type="text" id="station">
</div>

<div class="grid">
    <label>Officer</label>
    <input type="text" id="officer">
</div>

<h2>Data Entry</h2>

<div class="grid"><label>New Adult Registration</label><input type="number" id="adultMale" oninput="calculate()"><input type="number" id="adultFemale" oninput="calculate()"><input id="adultTotal" class="total-box" readonly></div>

<div class="grid"><label>Child Registration</label><input type="number" id="childMale" oninput="calculate()"><input type="number" id="childFemale" oninput="calculate()"><input id="childTotal" class="total-box" readonly></div>

<div class="grid"><label>Birth Registration</label><input type="number" id="birthMale" oninput="calculate()"><input type="number" id="birthFemale" oninput="calculate()"><input id="birthTotal" class="total-box" readonly></div>

<div class="grid"><label>Death Registration</label><input type="number" id="deathMale" oninput="calculate()"><input type="number" id="deathFemale" oninput="calculate()"><input id="deathTotal" class="total-box" readonly></div>

<div class="grid"><label>Renewal</label><input type="number" id="renewMale" oninput="calculate()"><input type="number" id="renewFemale" oninput="calculate()"><input id="renewTotal" class="total-box" readonly></div>

<div class="grid"><label>Update</label><input type="number" id="updateMale" oninput="calculate()"><input type="number" id="updateFemale" oninput="calculate()"><input id="updateTotal" class="total-box" readonly></div>

<div class="grid"><label>Cards Issued</label><input type="number" id="issuedMale" oninput="calculate()"><input type="number" id="issuedFemale" oninput="calculate()"><input id="issuedTotal" class="total-box" readonly></div>

<div style="text-align:center;">
    <button class="save" onclick="saveReport()">Save Report</button>
    <button class="new" onclick="newReport()">New Report</button>
    <button class="clear" onclick="clearReports()">Clear Reports</button>
</div>

</div>

<div class="card">
    <h2>Generated Reports</h2>
    <div id="reportsContainer"></div>
</div>

</div>

<script>
function getValue(id){
    return parseInt(document.getElementById(id).value)||0;
}

function calculate(){
    const pairs=[
        ['adultMale','adultFemale','adultTotal'],
        ['childMale','childFemale','childTotal'],
        ['birthMale','birthFemale','birthTotal'],
        ['deathMale','deathFemale','deathTotal'],
        ['renewMale','renewFemale','renewTotal'],
        ['updateMale','updateFemale','updateTotal'],
        ['issuedMale','issuedFemale','issuedTotal']
    ];

    pairs.forEach(p=>{
        document.getElementById(p[2]).value=getValue(p[0])+getValue(p[1]);
    });
}

function saveReport(){
    const reports=JSON.parse(localStorage.getItem('reports'))||[];

    reports.push({
        station:station.value,
        officer:officer.value,
        date:new Date().toLocaleString(),
        categories:[
            ["New Adult",getValue('adultMale'),getValue('adultFemale')],
            ["Child",getValue('childMale'),getValue('childFemale')],
            ["Birth",getValue('birthMale'),getValue('birthFemale')],
            ["Death",getValue('deathMale'),getValue('deathFemale')],
            ["Renewal",getValue('renewMale'),getValue('renewFemale')],
            ["Update",getValue('updateMale'),getValue('updateFemale')],
            ["Issued",getValue('issuedMale'),getValue('issuedFemale')]
        ]
    });

    localStorage.setItem('reports',JSON.stringify(reports));
    displayReports();
}

function displayReports(){
    const reports=JSON.parse(localStorage.getItem('reports'))||[];
    const container=document.getElementById('reportsContainer');
    container.innerHTML='';

    reports.slice().reverse().forEach((report,index)=>{
        let rows='';
        let grand=0;

        report.categories.forEach(cat=>{
            let total=cat[1]+cat[2];
            grand+=total;

            rows+=`
            <tr>
                <td>${cat[0]}</td>
                <td>${cat[1]}</td>
                <td>${cat[2]}</td>
                <td>${total}</td>
            </tr>`;
        });

        container.innerHTML+=`
        <div class="report-card">
            <h3>${report.station}</h3>
            <p><strong>Officer:</strong> ${report.officer}</p>
            <p><strong>Date:</strong> ${report.date}</p>

            <div class="table-wrapper">
            <table>
                <tr>
                    <th>Category</th>
                    <th>Male</th>
                    <th>Female</th>
                    <th>Total</th>
                </tr>
                ${rows}
                <tr class="grand">
                    <td colspan="3">Grand Total</td>
                    <td>${grand}</td>
                </tr>
            </table>
            </div>

            <button class="graph-btn" onclick="toggleGraph(${index})">View Graph</button>

            <div class="chart-box" id="chartBox${index}">
                <canvas id="chart${index}"></canvas>
            </div>
        </div>`;
    });
}

function toggleGraph(index){
    const box=document.getElementById(`chartBox${index}`);
    box.style.display=box.style.display==="block"?"none":"block";
    if(box.style.display==="block") drawSingleGraph(index);
}

function drawSingleGraph(index){
    const reports=JSON.parse(localStorage.getItem('reports'))||[];
    const report=reports.reverse()[index];

    const ctx=document.getElementById(`chart${index}`).getContext('2d');

    new Chart(ctx,{
        type:'bar',
        data:{
            labels:report.categories.map(c=>c[0]),
            datasets:[{
                data:report.categories.map(c=>c[1]+c[2]),
                backgroundColor:['#2563eb','#16a34a','#f59e0b','#dc2626','#9333ea','#06b6d4','#84cc16']
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{
                legend:{display:false},
                title:{display:true,text:'Category Performance'}
            }
        }
    });
}

function newReport(){
    document.querySelectorAll('input').forEach(i=>i.value='');
}

function clearReports(){
    if(confirm("Delete all reports?")){
        localStorage.removeItem('reports');
        displayReports();
    }
}

window.onload=displayReports;
</script>

</body>
</html>
